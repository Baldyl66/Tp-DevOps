name: CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Backend
        run: docker build -t taskboard-backend:latest -f Dockerfile.backend .

      - name: Build Frontend
        run: docker build -t taskboard-frontend:latest -f Dockerfile.frontend .
