name: CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-scan:
    name: Build & Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout du code
        uses: actions/checkout@v3

      # ==========================================
      # 1. Build du Backend
      # ==========================================
      - name: Build de l'image Backend
        run: docker build -t taskboard-backend:latest -f Dockerfile.backend .

      # ==========================================
      # 2. Build du Frontend
      # ==========================================
      - name: Build de l'image Frontend
        run: docker build -t taskboard-frontend:latest -f Dockerfile.frontend .

      # ==========================================
      # 3. Tests (Exemple de placeholder)
      # ==========================================
      - name: Exécuter les tests Backend
        run: echo "Ici, on lance les tests (ex: npm test, pytest, etc.)"
        
      - name: Exécuter les tests Frontend
        run: echo "Ici, on lance les tests (ex: npm test, jest, etc.)"

      # ==========================================
      # 4. Scan de vulnérabilités avec Trivy
      # ==========================================
      # Ce scan échouera délibérément si une faille CRITIQUE est trouvée,
      # ce qui est attendu pour l'objectif B du TP.
      
      - name: Scan Trivy sur le Backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'taskboard-backend:latest'
          format: 'table'
          exit-code: '0' # Fait échouer le pipeline si des vulnérabilités sont trouvées
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'

      - name: Scan Trivy sur le Frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'taskboard-frontend:latest'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'
